# File: .github/workflows/build-cosign.yml

name: Build and Check Cosign

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PCSC Lite library (for PKCS#11)
        run: sudo apt-get update && sudo apt-get install -y libpcsclite1

      - name: Download Cosign with PKCS#11 support
        run: |
          wget -O cosign https://github.com/sigstore/cosign/releases/download/v2.2.4/cosign-linux-pivkey-pkcs11key-amd64
          chmod +x cosign
          sudo mv cosign /usr/local/bin/cosign

      - name: Verify Cosign version and PKCS#11 support
        run: |
          cosign version
          cosign pkcs11-tool --help | head -3
