# File: .github/workflows/build-cosign.yml

name: Build and Check Cosign

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Cosign
        run: |
          wget https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64
          chmod +x cosign-linux-amd64
          sudo mv cosign-linux-amd64 /usr/local/bin/cosign

      # - name: Compile Cosign
      #   run: |
      #     go build ./...

      - name: Check Cosign version and PKCS#11 support
        env:
          COSIGN_PKCS11: "true"
        run: |
          cosign version
          cosign sign --help | grep -i pkcs11 || echo "PKCS#11 support not found"
